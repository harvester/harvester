name: Bump golang version

on:
  workflow_dispatch:
  schedule:
    # Run every day at 08:00 UTC
    - cron: "0 8 * * *"

jobs:
  updatecli:
    name: Bump golang version
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Updatecli
        uses: updatecli/updatecli-action@2cc8e6d8e356d76b0280cdd03766c36596a0614e # v3.0.0

      - name: Diff (dry-run on PR)
        if: github.ref != 'refs/heads/master'
        env:
          GITHUB_TOKEN: ${{ secrets.HARVESTER_TOKEN }}
        run: |
          updatecli compose diff --file updatecli/compose-golang-version.yaml

      - name: Apply
        if: github.ref == 'refs/heads/master'
        env:
          GITHUB_TOKEN: ${{ secrets.HARVESTER_TOKEN }}
        run: |
          updatecli compose apply --file updatecli/compose-golang-version.yaml
