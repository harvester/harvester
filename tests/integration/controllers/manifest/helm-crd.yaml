apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: helmcharts.helm.cattle.io
spec:
  group: helm.cattle.io
  names:
    kind: HelmChart
    plural: helmcharts
    singular: helmchart
  preserveUnknownFields: false
  scope: Namespaced
  versions:
    - additionalPrinterColumns:
        - jsonPath: .status.jobName
          name: Job
          type: string
        - jsonPath: .spec.chart
          name: Chart
          type: string
        - jsonPath: .spec.targetNamespace
          name: TargetNamespace
          type: string
        - jsonPath: .spec.version
          name: Version
          type: string
        - jsonPath: .spec.repo
          name: Repo
          type: string
        - jsonPath: .spec.helmVersion
          name: HelmVersion
          type: string
        - jsonPath: .spec.bootstrap
          name: Bootstrap
          type: string
      name: v1
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                targetNamespace:
                  type: string
                createNamespace:
                  type: boolean
                chart:
                  type: string
                version:
                  type: string
                repo:
                  type: string
                repoCA:
                  type: string
                repoCAConfigMap:
                  type: object
                  properties:
                    name:
                      type: string
                  description: "LocalObjectReference to the repo CA ConfigMap"
                set:
                  type: object
                  additionalProperties:
                    x-kubernetes-int-or-string: true
                  description: "Map of IntOrString values"
                valuesContent:
                  type: string
                helmVersion:
                  type: string
                bootstrap:
                  type: boolean
                chartContent:
                  type: string
                jobImage:
                  type: string
                backOffLimit:
                  type: integer
                  format: int32
                timeout:
                  type: string
                  pattern: '^([0-9]+(\.[0-9]+)?(ns|us|µs|ms|s|m|h))+$'
                  description: "metav1.Duration string format (e.g. 1h30m)"
                failurePolicy:
                  type: string
                authSecret:
                  type: object
                  properties:
                    name:
                      type: string
                  description: "LocalObjectReference to the auth Secret"
                authPassCredentials:
                  type: boolean
                dockerRegistrySecret:
                  type: object
                  properties:
                    name:
                      type: string
                  description: "LocalObjectReference to the docker registry Secret"
                podSecurityContext:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                  description: "corev1.PodSecurityContext definition"
                securityContext:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                  description: "corev1.SecurityContext definition"
            status:
              type: object
              properties:
                jobName:
                  type: string
      served: true
      storage: true
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: helmchartconfigs.helm.cattle.io
spec:
  group: helm.cattle.io
  names:
    kind: HelmChartConfig
    plural: helmchartconfigs
    singular: helmchartconfig
  preserveUnknownFields: false
  scope: Namespaced
  versions:
    - name: v1
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                failurePolicy:
                  type: string
                valuesContent:
                  type: string
      served: true
      storage: true
